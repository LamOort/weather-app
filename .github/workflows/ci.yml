name: CI/CD Pipeline

on:
  push:
    branches:
      - '**' # Runs on every commit to any branch

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        # using npx vitest run instead of npm run test to avoid watch mode hanging
        run: npx vitest run

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Netlify
    needs: test-and-build
    runs-on: ubuntu-latest
    # Only run deploy if tests and build succeed
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-folder
          path: dist/

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            # Production deploy for main/master branch
            npx netlify-cli deploy --dir=dist --prod
          else
            # Draft/preview deploy for all other branches
            npx netlify-cli deploy --dir=dist
          fi
